<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>AI Puzzle Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(160deg,#071421,#0d243b 60%, #0a1b2e);
color:#e8f6ff;
text-align:center;
}

.container{
width:520px;
max-width:94%;
margin:80px auto;
padding:45px;
border-radius:24px;
background:rgba(18,32,52,0.95);
border:1px solid rgba(0,180,255,0.25);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.grid{
position:relative;
width:330px;
height:330px;
margin:40px auto;
}

.tile{
position:absolute;
width:100px;
height:100px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:500;
background:linear-gradient(180deg,#123252,#102944);
border-radius:18px;
cursor:pointer;
border:1px solid rgba(0,200,255,0.35);
transition:all 0.25s ease;
}

.tile:hover{
border-color:rgba(0,255,255,0.7);
box-shadow:0 10px 20px rgba(0,200,255,0.15);
}

.tile:active{
transform:scale(0.9);
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.tile{
position:absolute;
width:100px;
height:100px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:500;
background:linear-gradient(180deg,#123252,#102944);
border-radius:18px;
cursor:pointer;
border:1px solid rgba(0,200,255,0.35);
transition:all 0.25s ease;
}

.tile:hover{
border-color:rgba(0,255,255,0.7);
box-shadow:0 10px 20px rgba(0,200,255,0.15);
}
#aiStatus{
margin-top:5px;
margin-bottom:10px;
font-size:14px;
opacity:0.8;
color:#9feaff;
}
</style>

</head>

<body>

<div id="startScreen" class="container">

<h2>AI Puzzle Lab</h2>
<div id="aiStatus"></div>

<button onclick="startGame()">Start Game</button>

</div>


<div id="gameContainer" class="container" style="display:none">

<h2>AI Puzzle Lab</h2>

<div id="aiStatus"></div>

<div>
<span id="timer">⏱ 0s</span>
<span id="moves"> 🎯 0</span>
</div>

<div class="grid" id="grid"></div>

<div class="controls">

<select id="algorithm">
<option value="astar">A*</option>
<option value="bfs">BFS</option>
</select>

<select onchange="shuffleBoard(this.value)">
<option disabled selected>Difficulty</option>
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button onclick="restart()">Restart</button>
<button onclick="undoMove()">Undo</button>
<button onclick="hintMove()">Hint</button>
<button onclick="solve()">AI Solve</button>

</div>

</div>

<script>

let board=[[1,2,3],[4,5,6],[7,8,0]]

let initialBoard
let moveHistory=[]

let seconds=0
let moveCount=0
let timerInterval
let timerStarted=false
let gameActive=false


function startGame(){

document.getElementById("startScreen").style.display="none"
document.getElementById("gameContainer").style.display="block"

shuffleBoard("medium")

}


function render(){

const grid=document.getElementById("grid")

grid.innerHTML=""

for(let i=0;i<3;i++){

for(let j=0;j<3;j++){

let value = board[i][j]

if(value===0) continue

const tile=document.createElement("div")

tile.className="tile"

tile.innerText=value

tile.style.left = (j*110) + "px"
tile.style.top  = (i*110) + "px"

tile.onclick = () => moveTile(i,j)

grid.appendChild(tile)

}

}

}


function findBlank(){

for(let i=0;i<3;i++)
for(let j=0;j<3;j++)
if(board[i][j]==0)
return{row:i,col:j}

}


function moveTile(r,c){

if(!gameActive)return

let blank=findBlank()

if(Math.abs(blank.row-r)+Math.abs(blank.col-c)==1){

if(!timerStarted){
startTimer()
}

moveHistory.push(JSON.parse(JSON.stringify(board)))

board[blank.row][blank.col]=board[r][c]
board[r][c]=0

moveCount++

document.getElementById("moves").innerText=" 🎯 "+moveCount

render()

}

}


function restart(){

board = JSON.parse(JSON.stringify(initialBoard))

moveHistory=[]

moveCount=0
seconds=0
timerStarted=false

clearInterval(timerInterval)

document.getElementById("moves").innerText=" 🎯 0"
document.getElementById("timer").innerText="⏱ 0s"

render()

}


function shuffleBoard(level){

moveHistory=[]

let moves=40

if(level=="easy")moves=15
if(level=="hard")moves=80

for(let i=0;i<moves;i++){

let blank=findBlank()

let neighbors=[
[blank.row-1,blank.col],
[blank.row+1,blank.col],
[blank.row,blank.col-1],
[blank.row,blank.col+1]
].filter(([r,c])=>r>=0&&r<3&&c>=0&&c<3)

let rand=neighbors[Math.floor(Math.random()*neighbors.length)]

board[blank.row][blank.col]=board[rand[0]][rand[1]]
board[rand[0]][rand[1]]=0

}

initialBoard=JSON.parse(JSON.stringify(board))

moveCount=0
seconds=0
timerStarted=false

clearInterval(timerInterval)

document.getElementById("moves").innerText=" 🎯 0"
document.getElementById("timer").innerText="⏱ 0s"

render()

gameActive=true

}


function startTimer(){

timerStarted=true

timerInterval=setInterval(()=>{

seconds++
document.getElementById("timer").innerText="⏱ "+seconds+"s"

},1000)

}


function undoMove(){

if(moveHistory.length==0)return

board=moveHistory.pop()

moveCount--

document.getElementById("moves").innerText=" 🎯 "+moveCount

render()

}


async function hintMove(){

document.getElementById("aiStatus").innerText="🤖 AI thinking..."

let algorithm=document.getElementById("algorithm").value

let res=await fetch("/solve",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({board:board,algorithm:algorithm})

})

let data=await res.json()

document.getElementById("aiStatus").innerText=""

if(data.solution_path.length>0){

applyMove(data.solution_path[0])

moveCount++

document.getElementById("moves").innerText=" 🎯 "+moveCount

render()

}

}


async function solve(){

document.getElementById("aiStatus").innerText="🤖 AI thinking..."

let algorithm=document.getElementById("algorithm").value

let res=await fetch("/solve",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({board:board,algorithm:algorithm})
})

let data=await res.json()

if(!data.solution_path || data.solution_path.length==0){

document.getElementById("aiStatus").innerText=""
alert("No solution found")
return

}

animateSolution(data.solution_path)

}


function animateSolution(path){

if(!timerStarted){
startTimer()
}

let i=0

let interval=setInterval(()=>{

if(i>=path.length){

clearInterval(interval)
document.getElementById("aiStatus").innerText=""
return

}

applyMove(path[i])

moveCount++

document.getElementById("moves").innerText=" 🎯 "+moveCount

render()

i++

},300)

}


function applyMove(dir){

dir = dir.toLowerCase()

let blank = findBlank()
let r = blank.row
let c = blank.col

// reverse direction (solver moves tile, we move blank)

if(dir==="up" && r<2){
board[r][c] = board[r+1][c]
board[r+1][c] = 0
}

else if(dir==="down" && r>0){
board[r][c] = board[r-1][c]
board[r-1][c] = 0
}

else if(dir==="left" && c<2){
board[r][c] = board[r][c+1]
board[r][c+1] = 0
}

else if(dir==="right" && c>0){
board[r][c] = board[r][c-1]
board[r][c-1] = 0
}

}

render()

</script>

</body>
</html>
