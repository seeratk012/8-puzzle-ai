<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>AI Puzzle Lab</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(160deg,#071421,#0d243b 60%, #0a1b2e);
color:white;
text-align:center;
}

.container{
width:520px;
max-width:94%;
margin:80px auto;
padding:40px;
border-radius:20px;
background:#102844;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin:40px 0;
}

.tile{
height:100px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
background:#123252;
border-radius:12px;
cursor:pointer;
transition:transform 0.25s ease;
}

.tile:active{
transform:scale(0.9);
}

.blank{visibility:hidden;}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

button,select{
padding:10px 20px;
border-radius:20px;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div id="startScreen" class="container">

<h2>AI Puzzle Lab</h2>

<button onclick="startGame()">Start Game</button>

</div>


<div id="gameContainer" class="container" style="display:none">

<h2>AI Puzzle Lab</h2>

<div id="aiStatus"></div>

<div>
<span id="timer">⏱ 0s</span>
<span id="moves"> 🎯 0</span>
</div>

<div class="grid" id="grid"></div>

<div class="controls">

<select id="algorithm">
<option value="astar">A*</option>
<option value="bfs">BFS</option>
</select>

<select onchange="shuffleBoard(this.value)">
<option disabled selected>Difficulty</option>
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button onclick="undoMove()">Undo</button>
<button onclick="hintMove()">Hint</button>
<button onclick="solve()">AI Solve</button>

</div>

</div>

<script>

let board=[[1,2,3],[4,5,6],[7,8,0]]

let initialBoard
let moveHistory=[]

let seconds=0
let moveCount=0
let timerInterval
let gameActive=false


function startGame(){

document.getElementById("startScreen").style.display="none"
document.getElementById("gameContainer").style.display="block"

shuffleBoard("medium")

}


function render(){

const grid=document.getElementById("grid")
grid.innerHTML=""

for(let i=0;i<3;i++){

for(let j=0;j<3;j++){

const tile=document.createElement("div")
tile.className="tile"

if(board[i][j]==0){

tile.classList.add("blank")

}else{

tile.innerText=board[i][j]
tile.onclick=()=>moveTile(i,j)

}

grid.appendChild(tile)

}

}

}


function findBlank(){

for(let i=0;i<3;i++)
for(let j=0;j<3;j++)
if(board[i][j]==0)
return{row:i,col:j}

}


function moveTile(r,c){

if(!gameActive)return

let blank=findBlank()

if(Math.abs(blank.row-r)+Math.abs(blank.col-c)==1){

if(moveCount==0)startTimer()

moveHistory.push(JSON.parse(JSON.stringify(board)))

board[blank.row][blank.col]=board[r][c]
board[r][c]=0

moveCount++

document.getElementById("moves").innerText=" 🎯 "+moveCount

render()

}

}


function shuffleBoard(level){

moveHistory=[]

let moves=40

if(level=="easy")moves=15
if(level=="hard")moves=80

for(let i=0;i<moves;i++){

let blank=findBlank()

let neighbors=[
[blank.row-1,blank.col],
[blank.row+1,blank.col],
[blank.row,blank.col-1],
[blank.row,blank.col+1]
].filter(([r,c])=>r>=0&&r<3&&c>=0&&c<3)

let rand=neighbors[Math.floor(Math.random()*neighbors.length)]

board[blank.row][blank.col]=board[rand[0]][rand[1]]
board[rand[0]][rand[1]]=0

}

initialBoard=JSON.parse(JSON.stringify(board))

moveCount=0
seconds=0

render()

gameActive=true

}


function startTimer(){

timerInterval=setInterval(()=>{

seconds++
document.getElementById("timer").innerText="⏱ "+seconds+"s"

},1000)

}


function undoMove(){

if(moveHistory.length==0)return

board=moveHistory.pop()

moveCount--

render()

}


async function hintMove(){

document.getElementById("aiStatus").innerText="🤖 AI thinking..."

let algorithm=document.getElementById("algorithm").value

let res=await fetch("/solve",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({board:board,algorithm:algorithm})

})

let data=await res.json()

document.getElementById("aiStatus").innerText=""

if(data.solution_path.length>0){

applyMove(data.solution_path[0])
render()

}

}


async function solve(){

document.getElementById("aiStatus").innerText="🤖 AI thinking..."

let algorithm=document.getElementById("algorithm").value

let res=await fetch("/solve",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({board:board,algorithm:algorithm})

})

let data=await res.json()

document.getElementById("aiStatus").innerText=""

animateSolution(data.solution_path)

}


function animateSolution(path){

let i=0

let interval=setInterval(()=>{

if(i>=path.length){

clearInterval(interval)
return

}

applyMove(path[i])
render()

i++

},300)

}


function applyMove(dir){

dir=dir.toLowerCase()

let blank=findBlank()
let r=blank.row
let c=blank.col

if(dir=="up"&&r<2){board[r][c]=board[r+1][c];board[r+1][c]=0}
else if(dir=="down"&&r>0){board[r][c]=board[r-1][c];board[r-1][c]=0}
else if(dir=="left"&&c<2){board[r][c]=board[r][c+1];board[r][c+1]=0}
else if(dir=="right"&&c>0){board[r][c]=board[r][c-1];board[r][c-1]=0}

}

render()

</script>

</body>
</html>
